<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unified Notes Creator</title>
    <style>
        /* === MATERIAL 3 EXPRESSIVE DARK THEME === */
        :root {
            --md-sys-color-background: #1A1C19;
            --md-sys-color-on-background: #E2E3DD;
            --md-sys-color-surface: #2A2C29; 
            --md-sys-color-on-surface: #E2E3DD;
            --md-sys-color-on-surface-variant: #C2C9BD; 
            --md-sys-color-primary: #9CD67D; 
            --md-sys-color-on-primary: #0C3900;
            --md-sys-color-primary-container: #265108;
            --md-sys-color-error: #FFB4AB; 
            --md-sys-color-error-container: #93000A;
            --md-sys-color-outline: #8C9388;
            
            --radius-large: 28px;
            --radius-medium: 16px;
            --spacing: 12px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: var(--spacing);
        }

        .app-container {
            background-color: var(--md-sys-color-surface);
            border-radius: var(--radius-large);
            padding: 24px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid var(--md-sys-color-outline);
        }

        h1 { 
            text-align: center; 
            font-size: 24px; 
            font-weight: 700; 
            margin-top: 0;
            margin-bottom: 24px; 
            color: var(--md-sys-color-primary);
        }

        #toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .toolbar-btn, .toolbar-select {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            border: 1px solid var(--md-sys-color-outline);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            outline: none;
        }

        .toolbar-btn:hover {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-primary);
            border-color: var(--md-sys-color-primary-container);
        }

        .actions-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 16px;
        }

        .btn { 
            border: none; 
            border-radius: 100px; 
            font-weight: 600; 
            font-size: 15px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 12px 24px;
            flex: 1;
            min-width: 120px;
        }
        
        .btn-primary { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); }
        .btn-surface { background-color: var(--md-sys-color-background); color: var(--md-sys-color-on-surface); border: 1px solid var(--md-sys-color-outline); }
        .btn-error { background-color: var(--md-sys-color-error-container); color: var(--md-sys-color-error); }

        #editor {
            background-color: var(--md-sys-color-background);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--radius-medium);
            padding: 16px;
            min-height: 250px;
            color: var(--md-sys-color-on-background);
            transition: border-color 0.2s, box-shadow 0.2s;
            overflow-y: auto;
        }

        #editor:focus { outline: none; border-color: var(--md-sys-color-primary); box-shadow: 0 0 0 2px rgba(156, 214, 125, 0.2); }

        #editor mark { background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-primary); padding: 0.1rem 0.3rem; border-radius: 4px; }
        #editor h1 { font-size: 2em; font-weight: bold; margin-bottom: 0.5em; color: var(--md-sys-color-on-surface); }
        #editor h2 { font-size: 1.5em; font-weight: bold; margin-bottom: 0.5em; color: var(--md-sys-color-on-surface); }
        #editor h3, #editor h4, #editor h5, #editor h6 { font-weight: bold; margin-bottom: 0.5em; color: var(--md-sys-color-on-surface); }
        #editor ul, #editor ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        #editor blockquote { 
            border-left: 4px solid var(--md-sys-color-primary); 
            padding-left: 1rem; margin-bottom: 1rem; color: var(--md-sys-color-on-surface-variant); 
            font-style: italic; background: rgba(156, 214, 125, 0.05); padding: 0.5rem 0.5rem 0.5rem 1rem;
            border-radius: 0 4px 4px 0; page-break-inside: avoid;
        }
        #editor table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        #editor th, #editor td { border: 1px solid var(--md-sys-color-outline); padding: 8px; text-align: left; }
        #editor th { background-color: var(--md-sys-color-surface); }
        #editor code {
            background-color: var(--md-sys-color-surface); padding: 0.2rem 0.4rem; border-radius: 4px;
            font-family: monospace; color: var(--md-sys-color-primary); border: 1px solid var(--md-sys-color-outline);
        }
        #editor img {
            max-width: 100%; height: auto; border-radius: 8px; margin: 8px 0;
            display: block; cursor: pointer; transition: width 0.2s ease-in-out;
            page-break-inside: avoid; break-inside: avoid;
        }

        #markdownOutput {
            background-color: var(--md-sys-color-background);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--radius-medium);
            padding: 16px;
            margin-top: 16px;
            color: var(--md-sys-color-on-surface-variant);
            font-family: monospace;
            font-size: 14px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .hidden { display: none !important; }
        .spinner-container { display: flex; justify-content: center; margin-top: 16px; }
        .spinner {
            border: 4px solid rgba(156, 214, 125, 0.1); width: 36px; height: 36px; border-radius: 50%;
            border-left-color: var(--md-sys-color-primary); animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #pdfViewerWrapper {
            background-color: var(--md-sys-color-background);
            border: 1px solid var(--md-sys-color-outline);
            border-radius: var(--radius-medium);
            padding: 16px;
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .pdf-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--md-sys-color-on-surface);
            font-size: 14px;
            font-weight: 500;
        }

.canvas-container {
    width: 100%;
    max-height: 60vh; /* Limits height so it doesn't take over the whole screen */
    overflow: auto; /* Enables both horizontal and vertical panning */
    background-color: #fff;
    border-radius: 8px;
    /* Removed 'display: flex' to ensure scrolling works from top-left */
}

#pdfCanvas {
    /* Removed 'max-width: 100%' so the canvas can render at its true size */
    display: block;
    margin: 0 auto;
}

    </style>
    <!-- Link to the manifest file -->
    <link rel="manifest" href="./manifest.json">

    <!-- Register the Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('Service Worker registered successfully');
            })
            .catch(error => {
              console.log('Service Worker registration failed:', error);
            });
        });
      }
    </script>
</head>
<body>
    
    <div class="app-container">
        <h1>Unified Notes Creator</h1>
        
        <div id="toolbar">
            <button class="toolbar-btn" style="font-weight: bold;" onmousedown="event.preventDefault(); document.execCommand('bold', false, null)">B</button>
            <button class="toolbar-btn" style="font-style: italic;" onmousedown="event.preventDefault(); document.execCommand('italic', false, null)">I</button>
            <button class="toolbar-btn" style="text-decoration: underline;" onmousedown="event.preventDefault(); document.execCommand('underline', false, null)">U</button>
            <button class="toolbar-btn" style="text-decoration: line-through;" onmousedown="event.preventDefault(); document.execCommand('strikeThrough', false, null)">S</button>
            
            <button class="toolbar-btn" onmousedown="event.preventDefault(); document.execCommand('formatBlock', false, 'blockquote')">Quote</button>
            <button class="toolbar-btn" style="border-color: var(--md-sys-color-primary);" onmousedown="event.preventDefault(); document.execCommand('formatBlock', false, 'p')">Normal Text</button>

            <button class="toolbar-btn" onmousedown="event.preventDefault(); insertCode()">Code</button>
            <button class="toolbar-btn" onmousedown="event.preventDefault(); insertHighlight()">Mark</button>
            
            <select id="headerSelect" class="toolbar-select" onchange="document.execCommand('formatBlock', false, this.value); this.selectedIndex=0;">
                <option selected disabled>Header</option>
                <option value="p">Paragraph</option>
                <option value="h1">H1</option>
                <option value="h2">H2</option>
                <option value="h3">H3</option>
            </select>
            
            <button class="toolbar-btn" onmousedown="event.preventDefault(); document.execCommand('insertUnorderedList', false, null)">Bullets</button>
            <button class="toolbar-btn" onmousedown="event.preventDefault(); document.execCommand('insertOrderedList', false, null)">Numbers</button>
            <button class="toolbar-btn" onmousedown="event.preventDefault(); insertCheckbox()">Task</button>
            <button class="toolbar-btn" onmousedown="event.preventDefault(); insertCustomTable()">Table</button>
            
            <button class="toolbar-btn" onmousedown="event.preventDefault(); document.getElementById('imageInput').click()">Image</button>
            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageUpload(this)">
        </div>

        <div id="editor" contenteditable="true"></div>
        
        <div class="actions-row">
            <button class="btn btn-primary" onclick="generatePDF()">Export PDF</button>
            <button class="btn btn-surface" onclick="pasteMarkdown()">Paste MD</button>
            <button class="btn btn-surface" onclick="convertToMarkdown()">To MD</button>
            <!-- New Open PDF Button -->
            <button class="btn btn-surface" onclick="document.getElementById('pdfInput').click()">Open PDF</button>
            <input type="file" id="pdfInput" accept="application/pdf" style="display:none" onchange="loadLocalPDF(this)">
            
            <button id="copy-btn" class="btn btn-surface" onclick="copyToClipboard()">Copy</button>
            <button class="btn btn-error" onclick="clearAll()">Clear</button>
        </div>

        <div id="spinner-wrapper" class="spinner-container hidden">
            <div id="spinner" class="spinner"></div>
        </div>
        
        <div id="markdownOutput" class="hidden"></div>
    </div>
    
    <!-- PDF Viewer Container -->
    <div id="pdfViewerWrapper" class="hidden">
<div class="pdf-toolbar">
    <button class="toolbar-btn" onclick="prevPage()">Prev</button>
    
    <!-- New Zoom Buttons -->
    <button class="toolbar-btn" onclick="zoomOut()">-</button>
    <span><span id="page_num"></span>/<span id="page_count"></span></span>
    <button class="toolbar-btn" onclick="zoomIn()">+</button>
    
    <button class="toolbar-btn" onclick="nextPage()">Next</button>
    <button class="toolbar-btn" style="border-color: var(--md-sys-color-error);" onclick="closePDFViewer()">Close</button>
</div>
        <div class="canvas-container">
            <canvas id="pdfCanvas"></canvas>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/turndown/7.0.0/turndown.min.js"></script>
    <script src="https://unpkg.com/turndown-plugin-gfm/dist/turndown-plugin-gfm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- PDF.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Set the worker source for PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    
    <script>
        function insertCheckbox() {
            const html = '<ul><li style="list-style-type: none;"><input type="checkbox" disabled> Task</li></ul><br>';
            document.execCommand('insertHTML', false, html);
        }

        function insertCustomTable() {
            let input = prompt("Enter table size as Rows,Columns (e.g., 3,3 max 4x4):", "2,2");
            if (!input) return;
            
            let parts = input.split(',');
            let rows = parseInt(parts[0]) || 2;
            let cols = parseInt(parts[1]) || 2;
            
            rows = Math.min(Math.max(rows, 1), 4);
            cols = Math.min(Math.max(cols, 1), 4);
            
            let html = '<br><table>';
            for (let r = 0; r < rows; r++) {
                html += '<tr>';
                for (let c = 0; c < cols; c++) {
                    if (r === 0) {
                        html += '<th>Header</th>';
                    } else {
                        html += '<td>Data</td>';
                    }
                }
                html += '</tr>';
            }
            html += '</table><br>';
            document.execCommand('insertHTML', false, html);
        }

        function insertCode() {
            const selection = document.getSelection();
            if(selection.rangeCount > 0 && selection.toString().length > 0) {
                document.execCommand('insertHTML', false, '<code>' + selection.toString() + '</code>');
            } else {
                document.execCommand('insertHTML', false, '<code>code</code>');
            }
        }

        function insertHighlight() {
            const selection = document.getSelection();
            if(selection.rangeCount > 0 && selection.toString().length > 0) {
                document.execCommand('insertHTML', false, '<mark>' + selection.toString() + '</mark>');
            } else {
                document.execCommand('insertHTML', false, '<mark>highlighted text</mark>');
            }
        }

        function handleImageUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const MAX_SIZE = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_SIZE) {
                                height *= MAX_SIZE / width;
                                width = MAX_SIZE;
                            }
                        } else {
                            if (height > MAX_SIZE) {
                                width *= MAX_SIZE / height;
                                height = MAX_SIZE;
                            }
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.85);
                        const imgHtml = `<br><img src="${compressedBase64}" alt="Inserted Image" style="width: 100%;" /><br>`;
                        document.execCommand('insertHTML', false, imgHtml);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
            input.value = '';
        }

        document.getElementById('editor').addEventListener('click', function(e) {
            if (e.target.tagName === 'IMG') {
                const currentWidth = e.target.style.width || '100%';
                if (currentWidth === '100%') {
                    e.target.style.width = '75%';
                } else if (currentWidth === '75%') {
                    e.target.style.width = '50%';
                } else if (currentWidth === '50%') {
                    e.target.style.width = '25%';
                } else {
                    e.target.style.width = '100%';
                }
            }
        });

        async function pasteMarkdown() {
            let mdText = "";
            try {
                mdText = await navigator.clipboard.readText();
            } catch (err) {
                console.warn("Clipboard API failed or blocked, falling back to prompt");
            }
            
            if (!mdText) {
                mdText = prompt("Paste your Markdown text here:");
            }

            if (mdText) {
                const html = marked.parse(mdText);
                document.execCommand('insertHTML', false, html);
            }
        }

        // ==========================================
        // UPDATED: convertToMarkdown with Image Intercept
        // ==========================================
        function convertToMarkdown() {
            const editorContent = document.getElementById("editor").innerHTML;
            
            const turndownService = new TurndownService({
                headingStyle: 'atx',
                codeBlockStyle: 'fenced',
                bulletListMarker: '-'
            });
            
            const gfm = turndownPluginGfm.gfm;
            turndownService.use(gfm);

            // Intercept images, save them to shared memory, and output a clean tag
            turndownService.addRule('images', {
                filter: 'img',
                replacement: function (content, node) {
                    const src = node.getAttribute('src');
                    if (src && src.startsWith('data:image')) {
                        const imgId = 'local_img_' + Date.now() + Math.floor(Math.random() * 100);
                        try {
                            localStorage.setItem(imgId, src);
                            return `\n\n![Image](local:${imgId})\n\n`;
                        } catch (e) {
                            console.error("Storage Error", e);
                            alert("Your browser's local storage is full! Please clear old unused images from the Memos app.");
                            return `\n\n![Storage Full]()\n\n`;
                        }
                    }
                    return `![${node.alt || 'Image'}](${src})`;
                }
            });

            const markdown = turndownService.turndown(editorContent);

            const outputDiv = document.getElementById("markdownOutput");
            outputDiv.innerHTML = markdown;
            outputDiv.classList.remove("hidden");
        }

        async function copyToClipboard() {
            const markdownOutput = document.getElementById("markdownOutput");
            const textToCopy = markdownOutput.innerText;

            if (!textToCopy || markdownOutput.classList.contains("hidden")) {
                alert("Convert your text to markdown first to copy it.");
                return;
            }
            
            try {
                await navigator.clipboard.writeText(textToCopy);
                triggerCopySuccess();
            } catch (err) {
                try {
                    const tempTextArea = document.createElement("textarea");
                    tempTextArea.value = textToCopy;
                    document.body.appendChild(tempTextArea);
                    tempTextArea.select();
                    document.execCommand("copy");
                    document.body.removeChild(tempTextArea);
                    triggerCopySuccess();
                } catch (fallbackErr) {
                    alert("Failed to copy text.");
                }
            }
        }

        function triggerCopySuccess() {
            const copyBtn = document.getElementById("copy-btn");
            if (copyBtn) {
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Copied!";
                setTimeout(() => { copyBtn.innerText = originalText; }, 2000);
            }
        }

        function generatePDF() {
            const editorDiv = document.getElementById("editor");
            const editorContent = editorDiv.innerHTML;
            const rawText = editorDiv.innerText.trim();

            if (!editorContent.trim() || editorContent === '<br>') {
                alert("The editor is empty!");
                return;
            }

            const spinner = document.getElementById("spinner-wrapper");
            spinner.classList.remove("hidden");

            let fileNameBase = "Note";
            if (rawText) {
                fileNameBase = rawText.substring(0, 25).replace(/[^a-zA-Z0-9 \-]/g, "").trim().replace(/\s+/g, "_");
            }
            const dateStr = new Date().toISOString().slice(0,10);
            const timeStr = new Date().toLocaleTimeString('en-GB', { hour12: false }).replace(/:/g, '');
            const finalFilename = `${fileNameBase}_${dateStr}_${timeStr}.pdf`;

            const printContent = `
                <div style="width: 720px; background-color: #FFFFFF; color: #000000; font-family: system-ui, -apple-system, sans-serif; box-sizing: border-box;">
                    <style>
                        body { margin: 0; padding: 0; }
                        table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; page-break-inside: avoid; }
                        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
                        th { background-color: #f0f0f0; }
                        img { max-width: 100%; height: auto; margin: 8px 0; page-break-inside: avoid; break-inside: avoid; }
                        blockquote { border-left: 4px solid #9CD67D; padding-left: 1rem; font-style: italic; background: #f9f9f9; padding: 0.5rem; page-break-inside: avoid; }
                        code { background-color: #f0f0f0; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
                        mark { background-color: #9CD67D; color: #000; padding: 0.1rem 0.3rem; }
                        ul { padding-left: 1.5rem; }
                        input[type="checkbox"] { margin-right: 8px; }
                    </style>
                    ${editorContent}
                </div>
            `;

            const opt = {
                margin:       0.5,
                filename:     finalFilename,
                image:        { type: 'jpeg', quality: 0.95 },
                html2canvas:  { 
                    scale: 2, 
                    useCORS: true, 
                    scrollY: 0,
                    windowWidth: 720 
                },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' },
                pagebreak:    { mode: ['css', 'legacy'], avoid: ['img', 'tr', 'blockquote', 'table'] } 
            };

            html2pdf().set(opt).from(printContent).save().then(() => {
                spinner.classList.add("hidden");
            }).catch(err => {
                console.error("PDF generation error:", err);
                spinner.classList.add("hidden");
                alert("An error occurred generating the PDF.");
            });
        }

        function clearAll() {
            if(confirm("Are you sure you want to clear the editor?")) {
                document.getElementById('editor').innerHTML = '';
                document.getElementById('markdownOutput').innerHTML = '';
                document.getElementById('markdownOutput').classList.add('hidden');
            }
        }

        // --- PDF Viewer Variables ---
        let pdfDoc = null,
            pageNum = 1,
            pageRendering = false,
            pageNumPending = null,
            scale = 0.75, // Increase for better resolution on high DPI screens
            canvas = document.getElementById('pdfCanvas'),
            ctx = canvas.getContext('2d');

        // --- Load Local PDF ---
        function loadLocalPDF(input) {
            const file = input.files[0];
            if (file && file.type === 'application/pdf') {
                const reader = new FileReader();
                
                // Show spinner while processing
                document.getElementById("spinner-wrapper").classList.remove("hidden");
                
                reader.onload = function(e) {
                    // PDF.js requires a Uint8Array
                    const typedarray = new Uint8Array(e.target.result);
                    
                    // Parse the PDF
                    pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
                        pdfDoc = pdf;
                        document.getElementById('page_count').textContent = pdf.numPages;
                        
                        // Show the viewer and hide spinner
                        document.getElementById('pdfViewerWrapper').classList.remove('hidden');
                        document.getElementById("spinner-wrapper").classList.add("hidden");
                        
                        // Render the first page
                        pageNum = 1;
                        renderPage(pageNum);
                    }).catch(function(error) {
                        console.error("Error loading PDF:", error);
                        document.getElementById("spinner-wrapper").classList.add("hidden");
                        alert("Failed to load the PDF.");
                    });
                };
                
                // Read file as an ArrayBuffer
                reader.readAsArrayBuffer(file);
            }
            // Reset input so the same file can be loaded again if needed
            input.value = ''; 
        }

        // --- Render a Specific Page ---
        function renderPage(num) {
            pageRendering = true;
            
            pdfDoc.getPage(num).then(function(page) {
                const viewport = page.getViewport({ scale: scale });
                
                // Set canvas dimensions to match the PDF viewport
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                
                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport
                };
                
                const renderTask = page.render(renderContext);
                
                renderTask.promise.then(function() {
                    pageRendering = false;
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });
            
            // Update page counters
            document.getElementById('page_num').textContent = num;
        }

        // --- Pagination Functions ---
        function queueRenderPage(num) {
            if (pageRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function prevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function nextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        // --- Close Viewer ---
        function closePDFViewer() {
            document.getElementById('pdfViewerWrapper').classList.add('hidden');
            pdfDoc = null;
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear the canvas memory
        }
// --- Zoom Functions ---
function zoomIn() {
    scale += 0.25; // Increase zoom level
    queueRenderPage(pageNum);
}

function zoomOut() {
    if (scale <= 0.5) return; // Prevent zooming out until it disappears
    scale -= 0.25; // Decrease zoom level
    queueRenderPage(pageNum);
}

    </script>
</body>
